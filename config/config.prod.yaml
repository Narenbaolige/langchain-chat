# ==========================================
# langchain-chat — Production Overrides
# Merged on top of config.yaml when APP_ENV=prod
# ==========================================

app:
  env: prod
  debug: false

storage:
  type: mysql
  mysql:
    host: localhost
    port: 3306
    database: langchain_chat
    user: langchain
    password: ""
    pool_size: 10

logging:
  level: INFO
