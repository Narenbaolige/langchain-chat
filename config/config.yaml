# ==========================================
# langchain-chat — Application Configuration
# ==========================================

app:
  name: langchain-chat
  env: dev
  debug: false

storage:
  type: sqlite
  database: data/chat.db
  mysql:
    host: localhost
    port: 3306
    database: langchain_chat
    user: root
    password: ""
    pool_size: 5

llm:
  provider: chatanywhere
  model: gpt-4o-mini-ca
  temperature: 0.7
  max_tokens: 4096
  timeout: 60
  max_retries: 3
  models:
    openai:
      - gpt-4o-mini
      - gpt-4o
      - gpt-4-turbo
      - gpt-4.1
      - o4-mini
    deepseek:
      - deepseek-chat
      - deepseek-reasoner
    openrouter:
      - openai/gpt-4o-mini
      - openai/gpt-4o
      - anthropic/claude-sonnet-4
    chatanywhere:
      - gpt-4o-mini-ca
      - gpt-4.1-mini-ca
      - gpt-5.4-mini-ca
      - deepseek-chat
      - deepseek-r1
      - deepseek-v3.2
      - deepseek-v4-pro

logging:
  level: INFO
  format: "%(asctime)s [%(levelname)-7s] %(name)s: %(message)s"
  file: logs/app.log

security:
  max_input_length: 5000
  context_max_tokens: 4000
