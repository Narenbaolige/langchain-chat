# ==========================================
# langchain-chat — Application Configuration
# ==========================================

app:
  name: langchain-chat
  env: dev
  debug: false

storage:
  type: sqlite
  database: data/chat.db
  mysql:
    host: localhost
    port: 3306
    database: langchain_chat
    user: root
    password: ""
    pool_size: 5

llm:
  provider: openai
  model: gpt-4o-mini
  temperature: 0.7
  max_tokens: 4096
  timeout: 60
  max_retries: 3
  models:
    openai:
      - gpt-4o-mini
      - gpt-4o
      - gpt-4-turbo
      - gpt-4.1
      - o4-mini
    deepseek:
      - deepseek-chat
      - deepseek-reasoner
    openrouter:
      - openai/gpt-4o-mini
      - openai/gpt-4o
      - anthropic/claude-sonnet-4

logging:
  level: INFO
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
