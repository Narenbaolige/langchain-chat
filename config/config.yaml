# ==========================================
# langchain-chat — Application Configuration
# ==========================================

app:
  name: langchain-chat
  env: dev
  debug: false

storage:
  type: sqlite
  database: data/chat.db

llm:
  provider: ""
  model: ""
  temperature: 0.7
  max_tokens: 4096
  timeout: 60
  max_retries: 3

logging:
  level: INFO
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
